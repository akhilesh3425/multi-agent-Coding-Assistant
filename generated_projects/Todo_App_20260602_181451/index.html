<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Todo App</h1>
    </header>
    <main>
        <div>
            <input type="text" id="todoInput" placeholder="Add a new todo">
            <button id="addTodoButton">Add Todo</button>
        </div>
        <ul id="todoList"></ul>
    </main>
    <footer>
        <p>&copy; 2023 Todo App. All rights reserved.</p>
    </footer>
    <script>
        let todoList = [];
        let selectedTodo = null;

        function renderTodoList() {
            const todoListElement = document.getElementById('todoList');
            todoListElement.innerHTML = '';
            todoList.forEach((todo, index) => {
                const li = document.createElement('li');
                li.textContent = todo;
                li.addEventListener('click', () => selectTodo(index));
                todoListElement.appendChild(li);
            });
        }

        function selectTodo(index) {
            selectedTodo = index;
            // Additional functionality will be implemented later
        }

        document.getElementById('addTodoButton').addEventListener('click', () => {
            const todoInput = document.getElementById('todoInput');
            const newTodo = todoInput.value.trim();
            if (newTodo) {
                todoList.push(newTodo);
                todoInput.value = '';
                renderTodoList();
            }
        });
    </script>
</body>
</html>

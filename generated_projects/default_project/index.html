<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather Dashboard</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>Weather Dashboard</h1>
    </header>
    <main>
      <section id="weather-data">
        <h2>Current Weather</h2>
        <!-- Weather data display will be dynamically inserted here -->
      </section>
      <section id="charts">
        <h2>Interactive Charts</h2>
        <!-- Charts will be rendered here -->
      </section>
      <section id="calendar-container">
        <h1>Calendar</h1>
        <div class="month-display">
          <!-- Current month will be displayed here -->
        </div>
        <div class="grid">
          <!-- Weekdays and dates will be rendered here -->
        </div>
      </section>
    </main>

    </footer>
    <script src="app.js"></script>
    <script src="calendar.js"></script>
    <script>
      function initializeCalendar() {
        // Functionality to populate the calendar grid with dates and highlight the current date will go here.
      }
    </script>
  </body>
</html>
